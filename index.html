<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iMerch FleetLink</title>
    
    <link rel="icon" type="image/png" href="i-Merch Media Logo.png">
    <link rel="apple-touch-icon" href="i-Merch Media Logo.png">
    <meta name="mobile-web-app-capable" content="yes">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --bg: rgba(255, 255, 255, 0.9); --text: #333; --border: #007AFF; --card-bg: #f8f9fa; --accent: #FF9500; }
        .dark-mode { --bg: rgba(28, 28, 30, 0.9); --text: #ffffff; --border: #0A84FF; --card-bg: #2c2c2e; }
        body, html, #map { height: 100%; width: 100%; margin: 0; padding: 0; background: #f0f0f0; overflow: hidden; }
        
        .logo-header { 
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%); 
            z-index: 1001; background: var(--bg); padding: 12px 30px; 
            border-radius: 60px; box-shadow: 0 8px 25px rgba(0,0,0,0.2); 
            display: flex; flex-direction: column; align-items: center; border: 2px solid var(--border);
        }
        .header-logo-img { height: 45px; }
        .logo-text { font-family: sans-serif; font-weight: 800; font-size: 20px; color: var(--text); }
        .logo-text span { color: #007AFF; }

        .side-controls { position: absolute; top: 20px; right: 20px; z-index: 1002; display: flex; flex-direction: column; gap: 10px; }
        .control-btn { background: var(--bg); border: 1.5px solid var(--border); width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer; }

        .menu { 
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); 
            z-index: 1000; background: var(--bg); padding: 18px; border-radius: 28px; 
            box-shadow: 0 10px 35px rgba(0,0,0,0.3); display: flex; flex-direction: column; 
            gap: 10px; width: 92%; max-width: 360px; border: 1px solid var(--border); color: var(--text);
        }

        #routeStatus { 
            position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%);
            background: #FF9500; color: white; padding: 10px 20px; border-radius: 25px;
            font-weight: bold; z-index: 1001; display: none; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; }
        .export-btn { background: #34C759; color: white; border: none; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 5px;}
        .fuel-log-btn { background: var(--accent) !important; color: white; border: none; padding: 12px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; }
        
        #fuelModal, #chartModal, #routeModal {
            display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); align-items: center; justify-content: center;
        }
        .modal-content { background: var(--bg); padding: 20px; border-radius: 20px; width: 90%; max-width: 450px; display: flex; flex-direction: column; gap: 15px; color: var(--text); overflow-y: auto; max-height: 90vh; }
        select, input { background: var(--card-bg); color: var(--text); border: 1px solid #ddd; padding: 12px; border-radius: 12px; width: 100%; }
        .profile-img { width: 55px; height: 55px; border-radius: 50%; border: 2.5px solid #007AFF; object-fit: cover; background: #eee; }
        
        .stats-row { display: flex; justify-content: space-between; font-size: 11px; font-weight: bold; padding-top: 5px; border-top: 1px solid #eee; margin-top: 5px; }
        .speed-val { color: #007AFF; font-size: 14px; }
        .km-flag { background: #FF3B30; color: white; border-radius: 50%; padding: 2px 6px; font-size: 10px; font-weight: bold; border: 2px solid white; text-align: center; }
    </style>
</head>
<body class="light-mode">
    <div id="routeStatus">
        <span id="routeInfo">Daily Summary</span><br>
        <small onclick="clearRouteLayer()" style="text-decoration:underline; cursor:pointer;">Close & Reset View</small>
    </div>

    <div class="logo-header">
        <img src="i-Merch Media Logo.png" class="header-logo-img">
        <div class="logo-text">Fleet<span>Link</span></div>
    </div>

    <div class="side-controls">
        <div class="control-btn" onclick="toggleTheme()">🌓</div>
        <div class="control-btn" onclick="openRouteModal()">🗺️</div>
    </div>

    <div id="map"></div>
    
    <div class="menu">
        <select id="driverPicker" onchange="updateDriverProfile()">
            <option value="ron">Ron Sarmenta</option>
            <option value="mico">Mico Balmaceda</option>
            <option value="darwin">Darwin Pengson</option>
            <option value="eljhay">Eljhay Ramos</option>
            <option value="vergel">Vergel Apurillo</option>
        </select>

        <div style="display:flex; align-items:center; gap:12px;">
            <img id="profilePic" src="ron.jpg" class="profile-img" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3135/3135715.png'">
            <div style="flex-grow: 1;">
                <b id="displayDriver">Ron Sarmenta</b><br>
                <span id="liveSpeed" class="speed-val">Speed: 0 km/h</span>
                <div class="stats-row">
                    <span>Dist: <span id="statDist">0.00</span> km</span>
                    <span>Batt: <span id="statBatt">--</span>%</span>
                </div>
            </div>
        </div>

        <button onclick="toggleTracking()" id="btn" style="padding:15px; border-radius:15px; background:#007AFF; color:white; font-weight:bold; border:none; cursor:pointer;">📡 Start Tracking</button>
        
        <div class="action-grid">
            <button onclick="openFuelModal()" class="fuel-log-btn">⛽ Fuel</button>
            <button onclick="openChartModal()" class="fuel-log-btn" style="background:#5856D6 !important;">📊 Report</button>
        </div>
    </div>

    <div id="routeModal">
        <div class="modal-content">
            <h3>🗺️ View Logged Route</h3>
            <select id="histDriver">
                <option value="ron">Ron Sarmenta</option>
                <option value="mico">Mico Balmaceda</option>
                <option value="darwin">Darwin Pengson</option>
                <option value="eljhay">Eljhay Ramos</option>
                <option value="vergel">Vergel Apurillo</option>
            </select>
            <input type="date" id="histDate">
            <button class="export-btn" onclick="loadRouteHistory()">Analyze Route</button>
            <button onclick="closeRouteModal()" style="background:none; border:none; color:gray;">Cancel</button>
        </div>
    </div>

    <div id="chartModal">
        <div class="modal-content">
            <h3>📊 Fleet Report</h3>
            <canvas id="fuelChart"></canvas>
            <button class="export-btn" onclick="exportDataToExcel()">📂 Export to Excel</button>
            <button class="export-btn" style="background:gray;" onclick="closeChartModal()">Close</button>
        </div>
    </div>

    <div id="fuelModal">
        <div class="modal-content">
            <h3>⛽ Fuel Entry</h3>
            <input type="number" id="fuelAmount" placeholder="PHP Amount">
            <input type="number" id="fuelLiters" placeholder="Liters">
            <button class="export-btn" onclick="submitFuel()">Save Log</button>
            <button onclick="closeFuelModal()">Cancel</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, update, push, get, remove, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://cartracker-1df45-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const map = L.map('map', { zoomControl: false }).setView([14.5794, 121.0359], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        let historyLayer = null;
        let markersGroup = L.layerGroup().addTo(map);
        let vehicleMarkers = {};
        let wakeLock = null;
        let fuelChartInstance = null;

        // --- CUSTOM ICONS ---
        const carIcon = L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/741/741407.png', iconSize: [45, 45], iconAnchor: [22, 22] });
        const bikeIcon = L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/2965/2965319.png', iconSize: [45, 45], iconAnchor: [22, 22] });

        function getVehicleType(driver) {
            const cars = ['ron', 'mico', 'darwin'];
            return cars.includes(driver.toLowerCase()) ? carIcon : bikeIcon;
        }

        // --- TRACKING & AUTO-CENTER ---
        window.toggleTracking = async () => {
            const btn = document.getElementById('btn');
            const driver = document.getElementById('driverPicker').value;
            const today = new Date().toISOString().split('T')[0];

            if (!window.isTracking) {
                window.isTracking = true;
                btn.innerText = "🛑 Stop Tracking";
                btn.style.background = "#FF3B30";

                window.watchID = navigator.geolocation.watchPosition(async pos => {
                    const lat = pos.coords.latitude, lng = pos.coords.longitude;
                    const speed = pos.coords.speed ? Math.round(pos.coords.speed * 3.6) : 0;
                    let batt = 0;
                    try { const b = await navigator.getBattery(); batt = Math.round(b.level * 100); } catch(e){}

                    // Update Firebase
                    update(ref(db, `cars/${driver}`), { lat, lng, speed, batt, lastUpdated: Date.now() });
                    push(ref(db, `history/${driver}/${today}`), { lat, lng, speed, time: Date.now(), batt });

                    // Auto-Center Map
                    map.panTo([lat, lng]);

                    document.getElementById('liveSpeed').innerText = `Speed: ${speed} km/h`;
                }, null, { enableHighAccuracy: true });

                if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen');
            } else {
                window.isTracking = false;
                navigator.geolocation.clearWatch(window.watchID);
                if (wakeLock) wakeLock.release();
                btn.innerText = "📡 Start Tracking";
                btn.style.background = "#007AFF";
            }
        };

        // --- REAL-TIME MARKER UPDATES ---
        onValue(ref(db, 'cars'), (snapshot) => {
            const data = snapshot.val();
            if(!data) return;
            for(let driver in data) {
                const { lat, lng } = data[driver];
                if(!vehicleMarkers[driver]) {
                    vehicleMarkers[driver] = L.marker([lat, lng], { icon: getVehicleType(driver) }).addTo(map).bindPopup(driver.toUpperCase());
                } else {
                    vehicleMarkers[driver].setLatLng([lat, lng]);
                    vehicleMarkers[driver].setIcon(getVehicleType(driver));
                }
            }
        });

        // --- RESTORED FUEL & REPORT LOGIC ---
        window.submitFuel = async () => {
            const driver = document.getElementById('driverPicker').value;
            const amount = document.getElementById('fuelAmount').value;
            const liters = document.getElementById('fuelLiters').value;
            if(!amount || !liters) return alert("Please fill all fields");
            await push(ref(db, 'fuelLogs'), { driver, amount, liters, date: new Date().toLocaleDateString(), time: Date.now() });
            alert("Fuel entry saved!");
            closeFuelModal();
        };

        window.loadDashboard = async () => {
            const snap = await get(ref(db, 'fuelLogs'));
            if(!snap.exists()) return;
            const logs = Object.values(snap.val());
            const dataMap = {};
            logs.forEach(l => dataMap[l.driver] = (dataMap[l.driver] || 0) + parseFloat(l.amount));
            
            if(fuelChartInstance) fuelChartInstance.destroy();
            fuelChartInstance = new Chart(document.getElementById('fuelChart'), {
                type: 'bar',
                data: { labels: Object.keys(dataMap), datasets: [{ label: 'Total PHP Spent', data: Object.values(dataMap), backgroundColor: '#007AFF' }] }
            });
        };

        window.exportDataToExcel = async () => {
            const snap = await get(ref(db, 'fuelLogs'));
            if(!snap.exists()) return alert("No data to export");
            const ws = XLSX.utils.json_to_sheet(Object.values(snap.val()));
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Fuel_History");
            XLSX.writeFile(wb, "iMerch_Fleet_Report.xlsx");
        };

        window.updateDriverProfile = () => {
            const picker = document.getElementById('driverPicker');
            const driver = picker.value;
            document.getElementById('profilePic').src = driver + ".jpg"; // Restored Ron Sarmenta.jpg logic
            document.getElementById('displayDriver').innerText = picker.options[picker.selectedIndex].text;
        };

        // UI Handlers
        window.openRouteModal = () => document.getElementById('routeModal').style.display = 'flex';
        window.closeRouteModal = () => document.getElementById('routeModal').style.display = 'none';
        window.openFuelModal = () => document.getElementById('fuelModal').style.display = 'flex';
        window.closeFuelModal = () => document.getElementById('fuelModal').style.display = 'none';
        window.openChartModal = () => { document.getElementById('chartModal').style.display = 'flex'; window.loadDashboard(); };
        window.closeChartModal = () => document.getElementById('chartModal').style.display = 'none';
        window.toggleTheme = () => document.body.classList.toggle('dark-mode');

        window.updateDriverProfile();
    </script>
</body>
</html>
