<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iMerch FleetTrack</title>
    
    <link rel="icon" type="image/png" href="i-Merch Media Logo.png">
    <link rel="apple-touch-icon" href="i-Merch Media Logo.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg: rgba(255, 255, 255, 0.9);
            --text: #333;
            --border: #007AFF;
            --card-bg: #f8f9fa;
            --accent: #FF9500;
        }

        .dark-mode {
            --bg: rgba(28, 28, 30, 0.9);
            --text: #ffffff;
            --border: #0A84FF;
            --card-bg: #2c2c2e;
        }

        body, html, #map { height: 100%; width: 100%; margin: 0; padding: 0; background: #f0f0f0; overflow: hidden; transition: background 0.3s; }
        
        .logo-header { 
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%); 
            z-index: 1001; background: var(--bg); padding: 12px 30px; 
            border-radius: 60px; box-shadow: 0 8px 25px rgba(0,0,0,0.2); 
            display: flex; flex-direction: column; align-items: center; gap: 4px; 
            border: 2px solid var(--border); backdrop-filter: blur(10px); 
            -webkit-backdrop-filter: blur(10px); min-width: 240px;
        }
        
        .header-logo-img { height: 55px; width: auto; }
        .brand-name { font-family: 'Segoe UI', sans-serif; font-size: 10px; font-weight: 700; color: #666; letter-spacing: 2px; text-transform: uppercase; }
        .logo-text { font-family: 'Segoe UI', sans-serif; font-weight: 800; font-size: 22px; color: var(--text); line-height: 1; }
        .logo-text span { color: #007AFF; }

        .side-controls {
            position: absolute; top: 20px; right: 20px; z-index: 1002;
            display: flex; flex-direction: column; gap: 10px;
        }

        .control-btn {
            background: var(--bg); border: 1.5px solid var(--border);
            width: 45px; height: 45px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; font-size: 22px;
            cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .traffic-on { background: #34C759; color: white; border-color: #248a3d; }

        .menu { 
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); 
            z-index: 1000; background: var(--bg); padding: 18px; border-radius: 28px; 
            box-shadow: 0 10px 35px rgba(0,0,0,0.3); display: flex; flex-direction: column; 
            align-items: center; gap: 10px; width: 92%; max-width: 340px; 
            border: 1px solid var(--border); max-height: 65vh; overflow-y: auto; color: var(--text);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }

        .vehicle-toggle-row {
            display: flex; background: var(--card-bg); border-radius: 12px; padding: 4px; width: 100%; gap: 4px;
        }
        .v-btn {
            flex: 1; padding: 8px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer;
            background: transparent; color: var(--text); font-size: 13px; transition: 0.2s;
        }
        .v-btn.active { background: #007AFF; color: white; }

        .stats-row { 
            display: flex; gap: 10px; align-items: center; width: 100%; 
            justify-content: space-around; background: var(--card-bg); 
            border-radius: 15px; padding: 12px 0; border: 1px solid rgba(0,0,0,0.1);
        }
        
        .speed-display { font-size: 28px; font-weight: 900; color: #007AFF; text-align: center; }
        button#btn { padding: 15px; border-radius: 16px; background: #007AFF; color: white; font-weight: 800; width: 100%; border: none; cursor: pointer; font-size: 16px; }
        button#btn.tracking-on { background: #FF3B30; }

        .fuel-log-btn { background: var(--accent) !important; margin-top: 5px; }

        /* Modal Styles */
        #fuelModal {
            display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); align-items: center; justify-content: center;
        }
        .modal-content {
            background: var(--bg); padding: 25px; border-radius: 20px; width: 85%; max-width: 300px;
            display: flex; flex-direction: column; gap: 15px; color: var(--text); border: 2px solid var(--accent);
        }
        .modal-content input { padding: 12px; border-radius: 10px; border: 1px solid #ccc; font-size: 16px; width: 100%; box-sizing: border-box; }
        
        .export-section { width: 100%; border-top: 1px solid rgba(0,0,0,0.1); padding-top: 10px; margin-top: 5px; display: flex; flex-direction: column; gap: 6px; }
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; }
        .export-btn { background: #34C759; color: white; border: none; padding: 12px; border-radius: 12px; font-weight: bold; font-size: 12px; cursor: pointer; }
        .view-btn { background: #5856D6; color: white; border: none; padding: 12px; border-radius: 12px; font-weight: bold; font-size: 12px; cursor: pointer; }
        .clear-btn { background: #8E8E93; color: white; border: none; padding: 8px; border-radius: 10px; font-weight: bold; font-size: 11px; width: 100%; margin-top: 5px; cursor: pointer; }

        .driver-container { display: flex; align-items: center; gap: 14px; width: 100%; padding: 5px 0; }
        .profile-img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #007AFF; object-fit: cover; }
        
        select, input[type="date"] { background: var(--card-bg); color: var(--text); border: 1px solid #ddd; padding: 12px; border-radius: 12px; width: 100%; font-weight: 600; }
    </style>
</head>
<body class="light-mode">
    <div class="logo-header">
        <div class="brand-name">i-Merch Media Inc.</div>
        <img src="i-Merch Media Logo.png" alt="iMerch Logo" class="header-logo-img">
        <div class="logo-text">Fleet<span>Track</span></div>
    </div>

    <div class="side-controls">
        <div class="control-btn" onclick="toggleTheme()" title="Toggle Dark Mode">🌓</div>
        <div id="trafficBtn" class="control-btn" onclick="toggleTraffic()" title="Live Traffic">🚦</div>
    </div>

    <div id="map"></div>
    
    <div class="menu" id="mainMenu">
        <select id="driverPicker" onchange="updateDriverProfile()">
            <option value="ron">Ron Sarmenta</option>
            <option value="mico">Mico Balmaceda</option>
            <option value="darwin">Darwin Pengson</option>
            <option value="eljhay">Eljhay Ramos</option>
            <option value="vergel">Vergel Apurillo</option>
        </select>

        <div class="vehicle-toggle-row">
            <button id="v-car" class="v-btn active" onclick="setVehicle('car')">🚗 Car</button>
            <button id="v-moto" class="v-btn" onclick="setVehicle('moto')">🏍️ Moto</button>
        </div>

        <div class="driver-container">
            <img id="profilePic" src="Ron Sarmenta.jpg" class="profile-img">
            <div style="display:flex; flex-direction:column; flex-grow:1;">
                <span id="displayDriver" style="font-weight:800; font-size:16px;">Ron Sarmenta</span>
                <span id="lastSeen" style="font-size:11px; opacity: 0.7;">System Ready</span>
            </div>
        </div>

        <button onclick="toggleTracking()" id="btn">📡 Start Tracking</button>
        <button onclick="openFuelModal()" id="fuelBtn" class="export-btn fuel-log-btn">⛽ Log Fuel Expense</button>

        <div class="stats-row">
            <div class="speed-display"><span id="speed">0</span><span style="font-size:11px; display:block; opacity: 0.7; font-weight: 600;">km/h</span></div>
            <div style="font-size:14px; font-weight:700; line-height: 1.5;">
                <span id="battery">🔋 --%</span><br>
                <span id="distance">🏁 0.00 km</span>
            </div>
        </div>

        <div class="export-section">
            <span style="font-size: 11px; font-weight: 800; opacity: 0.6; text-transform: uppercase;">History Management</span>
            <input type="date" id="historyDate">
            <div class="action-grid">
                <button class="view-btn" onclick="viewRoute()">🗺️ View Route</button>
                <button class="export-btn" onclick="exportHistory()">📂 Export Excel</button>
            </div>
            <button id="clearBtn" class="clear-btn" style="display:none;" onclick="clearRoute()">✖ Clear History Line</button>
        </div>
    </div>

    <div id="fuelModal">
        <div class="modal-content">
            <h3 style="margin:0; text-align:center;">⛽ Fuel Entry</h3>
            <input type="number" id="fuelAmount" placeholder="Amount (PHP)" step="0.01">
            <input type="number" id="fuelLiters" placeholder="Liters (L)" step="0.01">
            <div class="action-grid">
                <button class="export-btn" style="background:#FF3B30;" onclick="closeFuelModal()">Cancel</button>
                <button class="export-btn" onclick="submitFuel()">Save Log</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, update, push, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://cartracker-1df45-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const icons = {
            car: L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/744/744465.png', iconSize: [40, 40], iconAnchor: [20, 20] }),
            moto: L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/3721/3721619.png', iconSize: [40, 40], iconAnchor: [20, 20] })
        };

        const map = L.map('map', { zoomControl: false }).setView([14.5794, 121.0359], 15);
        const lightTiles = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
        const darkTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png');
        lightTiles.addTo(map);
        
        let carMarker = L.marker([14.5794, 121.0359], {icon: icons.car}).addTo(map);
        let historyLine = L.polyline([], {color: '#007AFF', weight: 6, opacity: 0.8}).addTo(map);
        
        let isTracking = false;
        let currentVehicle = 'car';
        let watchID = null;

        window.setVehicle = (type) => {
            currentVehicle = type;
            document.getElementById('v-car').classList.toggle('active', type === 'car');
            document.getElementById('v-moto').classList.toggle('active', type === 'moto');
            carMarker.setIcon(icons[type]);
            if (isTracking) update(ref(db, 'cars/car1'), { vehicleType: type });
        };

        window.openFuelModal = () => document.getElementById('fuelModal').style.display = 'flex';
        window.closeFuelModal = () => {
            document.getElementById('fuelModal').style.display = 'none';
            document.getElementById('fuelAmount').value = '';
            document.getElementById('fuelLiters').value = '';
        };

        window.submitFuel = async () => {
            const amount = document.getElementById('fuelAmount').value;
            const liters = document.getElementById('fuelLiters').value;
            const driverKey = document.getElementById('driverPicker').value;
            
            if(!amount || !liters) return alert("Please fill both fields.");

            await push(ref(db, `fuel_logs/${driverKey}`), {
                amount: parseFloat(amount),
                liters: parseFloat(liters),
                vehicle: currentVehicle,
                timestamp: new Date().getTime(),
                dateString: new Date().toLocaleDateString()
            });

            alert("Fuel logged successfully!");
            closeFuelModal();
        };

        window.toggleTheme = () => {
            const body = document.body;
            if (body.classList.contains('dark-mode')) {
                body.classList.remove('dark-mode');
                map.removeLayer(darkTiles);
                lightTiles.addTo(map);
            } else {
                body.classList.add('dark-mode');
                map.removeLayer(lightTiles);
                darkTiles.addTo-map(darkTiles);
            }
        };

        window.toggleTracking = async () => {
            const btn = document.getElementById('btn');
            const driverKey = document.getElementById('driverPicker').value;
            if (!isTracking) {
                isTracking = true;
                btn.innerText = "🛑 Stop Tracking";
                btn.classList.add('tracking-on');
                watchID = navigator.geolocation.watchPosition((pos) => {
                    const { latitude: lat, longitude: lng, speed: s } = pos.coords;
                    const speed = Math.round((s || 0) * 3.6);
                    update(ref(db, 'cars/car1'), { 
                        lat, lng, speed, 
                        driver: driverKey, 
                        vehicleType: currentVehicle,
                        lastUpdated: new Date().getTime() 
                    });
                    const today = new Date().toISOString().split('T')[0];
                    push(ref(db, `archives/${driverKey}/${today}`), { lat, lng, timestamp: new Date().getTime() });
                    map.panTo([lat, lng]);
                }, null, { enableHighAccuracy: true });
            } else {
                isTracking = false;
                navigator.geolocation.clearWatch(watchID);
                btn.innerText = "📡 Start Tracking";
                btn.classList.remove('tracking-on');
            }
        };

        onValue(ref(db, 'cars/car1'), (snap) => {
            if(snap.exists()){
                const d = snap.val();
                carMarker.setLatLng([d.lat, d.lng]);
                if(d.vehicleType) carMarker.setIcon(icons[d.vehicleType]);
                document.getElementById('speed').innerText = d.speed || 0;
                document.getElementById('battery').innerText = `🔋 ${d.battery || '--'}%`;
                document.getElementById('lastSeen').innerText = "Update: " + new Date().toLocaleTimeString();
            }
        });

        window.updateDriverProfile = () => {
            const picker = document.getElementById('driverPicker');
            document.getElementById('profilePic').src = picker.value + ".jpg";
            document.getElementById('displayDriver').innerText = picker.options[picker.selectedIndex].text;
        };
    </script>
</body>
</html>
