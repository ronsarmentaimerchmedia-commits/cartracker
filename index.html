<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iMerch FleetTrack</title>
    
    <link rel="icon" type="image/png" href="i-Merch Media Logo.png">
    <link rel="apple-touch-icon" href="i-Merch Media Logo.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg: white;
            --text: #333;
            --border: #007AFF;
            --card-bg: #f8f9fa;
        }

        .dark-mode {
            --bg: #1c1c1e;
            --text: #ffffff;
            --border: #0A84FF;
            --card-bg: #2c2c2e;
        }

        body, html, #map { height: 100%; width: 100%; margin: 0; padding: 0; background: #f0f0f0; overflow: hidden; transition: background 0.3s; }
        
        .logo-header { 
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%); 
            z-index: 1001; background: var(--bg); padding: 10px 25px; 
            border-radius: 50px; box-shadow: 0 6px 20px rgba(0,0,0,0.15); 
            display: flex; align-items: center; gap: 12px; border: 1.5px solid var(--border); 
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            min-width: 200px; justify-content: center;
        }
        
        .header-logo-img { height: 45px; width: auto; }
        .logo-text { font-family: 'Segoe UI', sans-serif; font-weight: 800; font-size: 20px; color: var(--text); }
        .logo-text span { color: #007AFF; }

        .theme-toggle {
            position: absolute; top: 25px; right: 20px; z-index: 1002;
            background: var(--bg); border: 1.5px solid var(--border);
            width: 40px; height: 40px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; font-size: 20px;
            cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .menu { 
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); 
            z-index: 1000; background: var(--bg); padding: 15px; border-radius: 24px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); display: flex; flex-direction: column; 
            align-items: center; gap: 8px; width: 90%; max-width: 320px; 
            border: 1px solid var(--border); max-height: 60vh; overflow-y: auto; color: var(--text);
        }

        .stats-row { 
            display: flex; gap: 10px; align-items: center; width: 100%; 
            justify-content: space-around; background: var(--card-bg); 
            border-radius: 12px; padding: 10px 0; border: 1px solid #444;
        }
        
        .speed-display { font-size: 24px; font-weight: 900; color: #007AFF; text-align: center; }
        button#btn { padding: 14px; border-radius: 14px; background: #007AFF; color: white; font-weight: 800; width: 100%; border: none; cursor: pointer; }
        button#btn.tracking-on { background: #FF3B30; }
        
        .export-section { width: 100%; border-top: 1px solid #444; padding-top: 10px; margin-top: 5px; display: flex; flex-direction: column; gap: 5px; }
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; width: 100%; }
        .export-btn { background: #34C759; color: white; border: none; padding: 10px; border-radius: 10px; font-weight: bold; font-size: 11px; cursor: pointer; }
        .view-btn { background: #5856D6; color: white; border: none; padding: 10px; border-radius: 10px; font-weight: bold; font-size: 11px; cursor: pointer; }
        .clear-btn { background: #8E8E93; color: white; border: none; padding: 6px; border-radius: 10px; font-weight: bold; font-size: 10px; width: 100%; margin-top: 5px; cursor: pointer; }

        .driver-container { display: flex; align-items: center; gap: 12px; width: 100%; }
        .profile-img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #007AFF; }
        
        select, input[type="date"] { background: var(--card-bg); color: var(--text); border: 1px solid #ddd; }
    </style>
</head>
<body class="light-mode">
    <div class="logo-header">
        <img src="i-Merch Media Logo.png" alt="iMerch Logo" class="header-logo-img">
        <div class="logo-text">Fleet<span>Track</span></div>
    </div>

    <div class="theme-toggle" onclick="toggleTheme()">🌓</div>

    <div id="map"></div>
    
    <div class="menu" id="mainMenu">
        <select id="driverPicker" onchange="updateDriverProfile()" style="width:100%; padding:10px; border-radius:12px; font-weight:600;">
            <option value="ron">Ron Sarmenta</option>
            <option value="mico">Mico Balmaceda</option>
            <option value="darwin">Darwin Pengson</option>
            <option value="eljhay">Eljhay Ramos</option>
            <option value="vergel">Vergel Apurillo</option>
        </select>

        <div class="driver-container">
            <img id="profilePic" src="Ron Sarmenta.jpg" class="profile-img">
            <div style="display:flex; flex-direction:column; flex-grow:1;">
                <span id="displayDriver" style="font-weight:800; font-size:14px;">Ron Sarmenta</span>
                <span id="lastSeen" style="font-size:10px; opacity: 0.7;">Waiting...</span>
            </div>
        </div>

        <button onclick="toggleTracking()" id="btn">📡 Start Tracking</button>

        <div class="stats-row">
            <div class="speed-display"><span id="speed">0</span><span style="font-size:10px; display:block; opacity: 0.7;">km/h</span></div>
            <div style="font-size:13px; font-weight:700; line-height: 1.4;">
                <span id="battery">🔋 --%</span><br>
                <span id="distance">🏁 0.00 km</span>
            </div>
        </div>

        <div class="export-section">
            <span style="font-size: 11px; font-weight: bold; opacity: 0.7;">📜 HISTORY MANAGEMENT</span>
            <input type="date" id="historyDate" style="padding: 10px; border-radius: 10px; font-family: sans-serif; margin-bottom: 5px;">
            <div class="action-grid">
                <button class="view-btn" onclick="viewRoute()">🗺️ View Route</button>
                <button class="export-btn" onclick="exportHistory()">📂 Export Excel</button>
            </div>
            <button id="clearBtn" class="clear-btn" style="display:none;" onclick="clearRoute()">✖ Clear History Line</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, update, push, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://cartracker-1df45-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const carIcon = L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/744/744465.png', iconSize: [40, 40], iconAnchor: [20, 20] });
        const map = L.map('map', { zoomControl: false }).setView([14.5794, 121.0359], 15);
        
        const lightTiles = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
        const darkTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png');
        lightTiles.addTo(map);
        
        let carMarker = L.marker([14.5794, 121.0359], {icon: carIcon}).addTo(map);
        let historyLine = L.polyline([], {color: '#007AFF', weight: 5, opacity: 0.7}).addTo(map);
        
        let isTracking = false;
        let watchID = null;

        // Theme Toggle
        window.toggleTheme = () => {
            const body = document.body;
            if (body.classList.contains('dark-mode')) {
                body.classList.remove('dark-mode');
                map.removeLayer(darkTiles);
                lightTiles.addTo(map);
            } else {
                body.classList.add('dark-mode');
                map.removeLayer(lightTiles);
                darkTiles.addTo(map);
            }
        };

        // Distance Calculation (Haversine Formula)
        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; // km
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        document.getElementById('historyDate').valueAsDate = new Date();

        window.toggleTracking = async () => {
            const btn = document.getElementById('btn');
            const driverKey = document.getElementById('driverPicker').value;
            if (!isTracking) {
                isTracking = true;
                btn.innerText = "🛑 Stop Tracking";
                btn.classList.add('tracking-on');
                watchID = navigator.geolocation.watchPosition((pos) => {
                    const { latitude: lat, longitude: lng, speed: s } = pos.coords;
                    const speed = Math.round((s || 0) * 3.6);
                    update(ref(db, 'cars/car1'), { lat, lng, speed, driver: driverKey, lastUpdated: new Date().getTime() });
                    const today = new Date().toISOString().split('T')[0];
                    push(ref(db, `archives/${driverKey}/${today}`), { lat, lng, timestamp: new Date().getTime() });
                    map.panTo([lat, lng]);
                }, null, { enableHighAccuracy: true });
            } else {
                isTracking = false;
                navigator.geolocation.clearWatch(watchID);
                btn.innerText = "📡 Start Tracking";
                btn.classList.remove('tracking-on');
            }
        };

        window.viewRoute = async () => {
            const driver = document.getElementById('driverPicker').value;
            const date = document.getElementById('historyDate').value;
            const snapshot = await get(ref(db, `archives/${driver}/${date}`));
            if(!snapshot.exists()) return alert("No route found.");
            const points = [];
            snapshot.forEach(child => { points.push([child.val().lat, child.val().lng]); });
            historyLine.setLatLngs(points);
            map.fitBounds(historyLine.getBounds(), {padding: [50, 50]});
            document.getElementById('clearBtn').style.display = 'block';
        };

        window.clearRoute = () => { historyLine.setLatLngs([]); document.getElementById('clearBtn').style.display = 'none'; };

        window.exportHistory = async () => {
            const driver = document.getElementById('driverPicker').value;
            const date = document.getElementById('historyDate').value;
            const snapshot = await get(ref(db, `archives/${driver}/${date}`));
            if(!snapshot.exists()) return alert("No data.");

            let totalKm = 0;
            let lastPoint = null;
            const data = [];

            snapshot.forEach(child => {
                const v = child.val();
                if (lastPoint) totalKm += getDistance(lastPoint.lat, lastPoint.lng, v.lat, v.lng);
                lastPoint = v;
                data.push({ Time: new Date(v.timestamp).toLocaleTimeString(), Lat: v.lat, Lng: v.lng });
            });

            data.push({}); // Empty row
            data.push({ Time: "TOTAL DISTANCE:", Lat: totalKm.toFixed(2) + " km" });

            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "History");
            XLSX.writeFile(wb, `iMerch_${driver}_${date}.xlsx`);
        };

        window.updateDriverProfile = () => {
            const picker = document.getElementById('driverPicker');
            document.getElementById('profilePic').src = picker.value + ".jpg";
            document.getElementById('displayDriver').innerText = picker.options[picker.selectedIndex].text;
            clearRoute();
        };

        onValue(ref(db, 'cars/car1'), (snap) => {
            if(snap.exists()){
                const d = snap.val();
                carMarker.setLatLng([d.lat, d.lng]);
                document.getElementById('speed').innerText = d.speed || 0;
                document.getElementById('battery').innerText = `🔋 ${d.battery || '--'}%`;
                document.getElementById('lastSeen').innerText = "Update: " + new Date().toLocaleTimeString();
            }
        });
    </script>
</body>
</html>
