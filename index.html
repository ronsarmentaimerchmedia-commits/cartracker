<body class="light-mode">
    <div class="logo-header">
        <img src="i-Merch Media Logo.png" class="header-logo-img" onerror="this.style.display='none'">
        <div class="logo-text">Fleet<span>Link</span></div>
    </div>

    <div class="side-controls">
        <div class="control-btn" onclick="toggleTheme()" title="Toggle Dark Mode">🌓</div>
        <div class="control-btn" id="followBtn" onclick="toggleFollowMe()" title="Follow Me">📍</div>
        <div class="control-btn" onclick="toggleMapStyle()" title="Satellite View">🛰️</div>
        <div class="control-btn" onclick="openRouteModal()" title="History">🗺️</div>
    </div>

    <div id="map" style="height: 100vh; width: 100vw;"></div>
    
    <div class="menu">
        <div class="profile-section">
            <img id="profilePic" src="Ron Sarmenta.jpg" class="profile-img" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3135/3135715.png'">
            <div>
                <b id="displayDriver" style="font-size: 18px;">Ron Sarmenta</b><br>
                <span class="update-time">Last Seen: <span id="lastUpdateTime">--:--:--</span></span>
            </div>
        </div>

        <select id="driverPicker" onchange="updateDriverProfile()" style="margin: 10px 0;">
            <option value="ron">Ron Sarmenta</option>
            <option value="mico">Mico Balmaceda</option>
            <option value="darwin">Darwin Pengson</option>
            <option value="eljhay">Eljhay Ramos</option>
            <option value="vergel">Vergel Archer</option>
        </select>

        <div class="stats-container">
            <div class="speed-display">
                <span id="liveSpeed" class="speed-val">0</span>
                <span class="speed-unit">km/h</span>
            </div>
            <div class="other-stats">
                <div class="stat-item">🔋 <span id="statBatt">--</span>%</div>
                <div class="stat-item">🏁 <span id="statDist">0.00</span> km</div>
            </div>
        </div>

        <div style="display:flex; gap:8px; margin-bottom: 12px;">
            <button id="typeCar" class="type-btn active" onclick="setVehicleType('car')">🚗 Auto</button>
            <button id="typeBike" class="type-btn" onclick="setVehicleType('bike')">🏍️ Motor</button>
        </div>

        <button onclick="toggleTracking()" id="btn" class="main-btn">📡 Start Tracking</button>
        
        <div class="section-label">History Management</div>
        <div class="action-grid">
            <button onclick="openFuelModal()" class="fuel-btn">⛽ Fuel Entry</button>
            <button onclick="checkAdminPass()" class="fuel-btn" style="background:#5856D6;">📊 Fleet Report</button>
        </div>
    </div>

    <div id="chartModal"><div class="modal-content"><h3>📊 Fleet Fuel Analysis</h3><canvas id="fuelChart"></canvas><button class="main-btn" onclick="exportFuelCSV()" style="background:#34C759; margin-top:10px;">Download CSV</button><button class="main-btn" style="background:gray; margin-top:5px;" onclick="closeChartModal()">Close</button></div></div>
    <div id="routeModal"><div class="modal-content"><h3>🗺️ View History</h3><select id="histDriver"><option value="ron">Ron Sarmenta</option></select><input type="date" id="histDate"><button class="main-btn" onclick="loadRouteHistory()">Analyze</button><button onclick="closeRouteModal()" style="border:none; background:none; margin-top:10px; width:100%;">Cancel</button></div></div>
    <div id="fuelModal"><div class="modal-content"><h3>⛽ Fuel Entry</h3><input type="number" id="fuelAmount" placeholder="PHP Amount"><input type="number" id="fuelLiters" placeholder="Liters"><button class="main-btn" onclick="submitFuel()">Save Log</button><button onclick="closeFuelModal()" style="border:none; background:none; margin-top:10px; width:100%;">Cancel</button></div></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, update, push, get, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://cartracker-1df45-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Map Setup with Error Handling
        const streetMap = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
        const satelliteMap = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');
        
        let map;
        try {
            map = L.map('map', { zoomControl: false, layers: [streetMap] }).setView([14.5794, 121.0359], 15);
        } catch (e) {
            console.error("Map initialization failed:", e);
        }
        
        let currentMapStyle = 'street';
        let vehicleMarkers = {};
        let selectedType = 'car';
        let fuelChartInstance = null;
        let followMe = false;
        let totalDistance = 0;
        let lastPosition = null;
        let deviceBattery = 0;

        const carIcon = L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/741/741407.png', iconSize: [40, 40], iconAnchor: [20, 20] });
        const bikeIcon = L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/2965/2965319.png', iconSize: [40, 40], iconAnchor: [20, 20] });

        // Battery Sync
        async function initBattery() {
            if ('getBattery' in navigator) {
                const battery = await navigator.getBattery();
                const sync = () => {
                    deviceBattery = Math.round(battery.level * 100);
                    const el = document.getElementById('statBatt');
                    if(el) el.innerText = deviceBattery;
                };
                sync();
                battery.addEventListener('levelchange', sync);
            }
        }
        initBattery();

        // Distance Calc
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        // Tracking Export to Global
        window.toggleTracking = async () => {
            const btn = document.getElementById('btn');
            const driver = document.getElementById('driverPicker').value;
            
            if (!window.isTracking) {
                window.isTracking = true;
                btn.innerText = "🛑 Stop Tracking"; btn.style.background = "#FF3B30";
                
                window.watchID = navigator.geolocation.watchPosition(async (pos) => {
                    const lat = pos.coords.latitude; 
                    const lng = pos.coords.longitude;
                    const speed = Math.round((pos.coords.speed || 0) * 3.6);
                    const now = new Date().toLocaleTimeString();

                    if (lastPosition) {
                        const dist = calculateDistance(lastPosition.lat, lastPosition.lng, lat, lng);
                        if (dist > 0.005) totalDistance += dist;
                    }
                    lastPosition = { lat, lng };

                    document.getElementById('liveSpeed').innerText = speed;
                    document.getElementById('statDist').innerText = totalDistance.toFixed(2);
                    document.getElementById('lastUpdateTime').innerText = now;
                    
                    update(ref(db, `cars/${driver}`), { 
                        lat, lng, speed, 
                        distance: totalDistance.toFixed(2),
                        battery: deviceBattery,
                        type: selectedType, 
                        lastUpdated: now 
                    });

                    if(followMe) map.panTo([lat, lng]);
                }, null, { enableHighAccuracy: true });
            } else {
                window.isTracking = false;
                navigator.geolocation.clearWatch(window.watchID);
                btn.innerText = "📡 Start Tracking"; btn.style.background = "#007AFF";
                lastPosition = null;
            }
        };

        // UI Handlers
        window.updateDriverProfile = async () => {
            const picker = document.getElementById('driverPicker');
            const driver = picker.value;
            document.getElementById('profilePic').src = (driver === "ron") ? "Ron Sarmenta.jpg" : driver + ".jpg";
            document.getElementById('displayDriver').innerText = picker.options[picker.selectedIndex].text;
            
            const snapshot = await get(ref(db, `cars/${driver}`));
            const data = snapshot.val();
            if(data) {
                document.getElementById('lastUpdateTime').innerText = data.lastUpdated || "--:--:--";
                document.getElementById('statDist').innerText = data.distance || "0.00";
                if(data.lat && data.lng) map.setView([data.lat, data.lng], 15);
            }
        };

        window.toggleMapStyle = () => {
            if (currentMapStyle === 'street') {
                map.removeLayer(streetMap); satelliteMap.addTo(map); currentMapStyle = 'satellite';
            } else {
                map.removeLayer(satelliteMap); streetMap.addTo(map); currentMapStyle = 'street';
            }
        };

        window.toggleTheme = () => document.body.classList.toggle('dark-mode');
        window.toggleFollowMe = () => {
            followMe = !followMe;
            document.getElementById('followBtn').classList.toggle('active', followMe);
        };
        
        // Modals
        window.openFuelModal = () => document.getElementById('fuelModal').style.display = 'flex';
        window.closeFuelModal = () => document.getElementById('fuelModal').style.display = 'none';
        window.openRouteModal = () => document.getElementById('routeModal').style.display = 'flex';
        window.closeRouteModal = () => document.getElementById('routeModal').style.display = 'none';
        window.closeChartModal = () => document.getElementById('chartModal').style.display = 'none';

        // Initial Call
        window.updateDriverProfile();

        // Firebase Sync for markers
        onValue(ref(db, 'cars'), (snapshot) => {
            const data = snapshot.val();
            if(!data) return;
            for(let d in data) {
                const icon = (data[d].type === 'bike') ? bikeIcon : carIcon;
                if(!vehicleMarkers[d]) {
                    vehicleMarkers[d] = L.marker([data[d].lat, data[d].lng], { icon: icon }).addTo(map).bindPopup(d.toUpperCase());
                } else {
                    vehicleMarkers[d].setLatLng([data[d].lat, data[d].lng]).setIcon(icon);
                }
            }
        });
    </script>
</body>
