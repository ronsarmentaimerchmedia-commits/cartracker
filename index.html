<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iMerch FleetLink</title>
    
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root { --bg: rgba(255, 255, 255, 0.95); --text: #333; --border: #007AFF; --card-bg: #ffffff; --accent: #FF9500; --secondary-text: #8e8e93; }
        .dark-mode { --bg: rgba(28, 28, 30, 0.95); --text: #ffffff; --border: #0A84FF; --card-bg: #1c1c1e; }
        
        body, html, #map { height: 100%; width: 100%; margin: 0; padding: 0; background: #f0f0f0; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        .logo-header { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); z-index: 1001; background: var(--bg); padding: 10px 25px; border-radius: 60px; box-shadow: 0 8px 25px rgba(0,0,0,0.15); display: flex; flex-direction: column; align-items: center; border: 1.5px solid var(--border); }
        .logo-text { font-weight: 800; font-size: 18px; color: var(--text); }
        .logo-text span { color: #007AFF; }

        .stats-container { background: var(--card-bg); border-radius: 20px; padding: 15px; margin: 10px 0; border: 1px solid #e5e5ea; display: flex; justify-content: space-between; align-items: center; }
        .speed-display { text-align: center; flex: 1; border-right: 1px solid #eee; }
        .speed-val { font-size: 28px; font-weight: 800; color: #007AFF; display: block; }
        .speed-unit { font-size: 12px; color: #007AFF; font-weight: bold; }
        
        .other-stats { flex: 1; padding-left: 15px; display: flex; flex-direction: column; gap: 5px; }
        .stat-item { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; color: var(--text); }

        .side-controls { position: absolute; top: 20px; right: 20px; z-index: 1002; display: flex; flex-direction: column; gap: 10px; }
        .control-btn { background: var(--bg); border: 1.5px solid var(--border); width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .control-btn.active { background: #007AFF; color: white; border-color: #007AFF; }

        .menu { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; background: var(--bg); padding: 20px; border-radius: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); display: flex; flex-direction: column; width: 92%; max-width: 380px; border: 1px solid rgba(0,122,255,0.2); color: var(--text); }
        .main-btn { padding: 16px; border-radius: 18px; background: #007AFF; color: white; font-weight: bold; border: none; cursor: pointer; font-size: 16px; width: 100%; margin-top: 5px; }
        
        #chartModal, #fuelModal, #historyModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .modal-content { background: var(--bg); padding: 20px; border-radius: 20px; width: 85%; max-width: 400px; color: var(--text); max-height: 85vh; overflow-y: auto; }
        .leaderboard-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; font-size: 14px; }
    </style>
</head>
<body class="light-mode">
    <div class="logo-header">
        <div class="logo-text">Fleet<span>Link</span></div>
    </div>

    <div class="side-controls">
        <div class="control-btn" onclick="toggleTheme()">🌓</div>
        <div class="control-btn" id="followBtn" onclick="toggleFollow()">📍</div>
        <div class="control-btn" onclick="toggleMapStyle()">🛰️</div>
        <div class="control-btn" onclick="openHistoryModal()">📋</div>
    </div>

    <div id="map"></div>
    
    <div class="menu">
        <div style="display:flex; align-items:center; gap:12px;">
            <img id="profilePic" src="Ron Sarmenta.jpg" style="width:50px; height:50px; border-radius:50%; border:2px solid #007AFF; object-fit:cover;" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3135/3135715.png'">
            <div>
                <b id="displayDriver">Ron Sarmenta</b><br>
                <span style="font-size:11px; color:var(--secondary-text);">Status: <span id="lastUpdateTime" style="color:#34C759; font-weight:bold;">Ready</span></span>
            </div>
        </div>

        <select id="driverPicker" onchange="updateDriverProfile()" style="margin: 10px 0; width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd;">
            <option value="ron">Ron Sarmenta</option>
            <option value="mico">Mico Balmaceda</option>
            <option value="darwin">Darwin Pengson</option>
            <option value="eljhay">Eljhay Ramos</option>
            <option value="vergel">Vergel Archer</option>
        </select>

        <div class="stats-container">
            <div class="speed-display">
                <span id="liveSpeed" class="speed-val">0</span>
                <span class="speed-unit">km/h</span>
            </div>
            <div class="other-stats">
                <div class="stat-item">🔋 <span id="statBatt">--</span>%</div>
                <div class="stat-item">🏁 <span id="statDist">0.00</span> km</div>
                <div class="stat-item">⛽ <span id="statEff">0.0</span> km/L</div>
            </div>
        </div>

        <button onclick="toggleTracking()" id="btn" class="main-btn">📡 Start Tracking</button>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top:10px;">
            <button onclick="openFuelModal()" style="background:#FF9500;" class="main-btn">⛽ Fuel</button>
            <button onclick="checkAdminPass()" style="background:#5856D6;" class="main-btn">📊 Report</button>
        </div>
    </div>

    <div id="fuelModal">
        <div class="modal-content">
            <h3>⛽ Fuel Log</h3>
            <input type="number" id="fuelLiters" placeholder="Liters Loaded" style="width:100%; padding:12px; margin-bottom:10px; border-radius:10px; border:1px solid #ddd;">
            <button class="main-btn" onclick="submitFuel()">Save & Reset Trip</button>
            <button onclick="closeModal('fuelModal')" style="width:100%; border:none; background:none; color:gray; margin-top:10px;">Cancel</button>
        </div>
    </div>

    <div id="chartModal">
        <div class="modal-content">
            <h3>📊 Fleet Report</h3>
            <div id="leaderboardList" style="margin-bottom:15px;"></div>
            <button onclick="exportToExcel()" class="main-btn" style="background:#34C759; margin-bottom:10px;">📥 Export to Excel</button>
            <button onclick="clearLogs()" class="main-btn" style="background:#FF3B30; margin-bottom:10px;">🗑️ Clear Logs</button>
            <button onclick="closeModal('chartModal')" class="main-btn" style="background:gray;">Close</button>
        </div>
    </div>

    <div id="historyModal">
        <div class="modal-content">
            <h3>📋 History</h3>
            <input type="date" id="historyDate" onchange="loadHistory()" style="width:100%; padding:10px; margin-bottom:15px;">
            <div id="historyList"></div>
            <button onclick="closeModal('historyModal')" class="main-btn" style="background:gray;">Close</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, update, push, get, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://cartracker-1df45-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const streetL = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
        const satelliteL = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');
        const map = L.map('map', { zoomControl: false, layers: [streetL] }).setView([14.5794, 121.0359], 15);

        let vehicleMarkers = {}, totalDistance = 0, lastPos = null, isFollowing = false;

        window.toggleMapStyle = () => map.hasLayer(streetL) ? (map.removeLayer(streetL), map.addLayer(satelliteL)) : (map.removeLayer(satelliteL), map.addLayer(streetL));
        window.toggleFollow = () => { isFollowing = !isFollowing; document.getElementById('followBtn').classList.toggle('active', isFollowing); };

        window.toggleTracking = async () => {
            const btn = document.getElementById('btn');
            const driverId = document.getElementById('driverPicker').value;
            if (!window.isTracking) {
                window.watchID = navigator.geolocation.watchPosition(async (pos) => {
                    window.isTracking = true;
                    btn.innerText = "🛑 Stop Tracking"; btn.style.background = "#FF3B30";
                    const { latitude: lat, longitude: lng, speed: s } = pos.coords;
                    const speed = Math.round((s || 0) * 3.6);
                    if (isFollowing) map.panTo([lat, lng]);
                    
                    let batt = "--"; 
                    try { const b = await navigator.getBattery(); batt = Math.round(b.level * 100); } catch(e){}
                    document.getElementById('statBatt').innerText = batt;
                    
                    if (lastPos) { 
                        const d = calculateDistance(lastPos.lat, lastPos.lng, lat, lng); 
                        if (d > 0.002) totalDistance += d; 
                    }
                    lastPos = { lat, lng };
                    document.getElementById('statDist').innerText = totalDistance.toFixed(2);
                    document.getElementById('liveSpeed').innerText = speed;
                    
                    update(ref(db, `cars/${driverId}`), { 
                        lat, lng, speed, battery: batt, 
                        lastSeen: new Date().toLocaleTimeString(),
                        status: "Active"
                    });
                }, null, { enableHighAccuracy: true });
            } else {
                window.isTracking = false; navigator.geolocation.clearWatch(window.watchID);
                btn.innerText = "📡 Start Tracking"; btn.style.background = "#007AFF";
                update(ref(db, `cars/${driverId}`), { status: "Offline" });
            }
        };

        window.updateDriverProfile = () => {
            const picker = document.getElementById('driverPicker');
            const name = picker.options[picker.selectedIndex].text;
            document.getElementById('displayDriver').innerText = name;
            document.getElementById('profilePic').src = name + ".jpg";
            
            // Fetch status/last seen for selected driver
            onValue(ref(db, `cars/${picker.value}`), (s) => {
                const data = s.val();
                if(data) document.getElementById('lastUpdateTime').innerText = `${data.status} (${data.lastSeen || '--'})`;
            });
        };

        window.submitFuel = () => {
            const liters = parseFloat(document.getElementById('fuelLiters').value);
            if (!liters || totalDistance <= 0) return alert("Enter valid liters and ensure distance > 0");
            const eff = (totalDistance / liters).toFixed(2);
            const driver = document.getElementById('displayDriver').innerText;
            push(ref(db, 'reports'), { driver, distance: totalDistance.toFixed(2), liters, efficiency: eff, date: new Date().toLocaleDateString() });
            totalDistance = 0; document.getElementById('statDist').innerText = "0.00";
            closeModal('fuelModal'); alert("Log Saved!");
        };

        window.exportToExcel = async () => {
            const snap = await get(ref(db, 'reports'));
            const data = snap.val();
            if(!data) return alert("No data to export");
            const rows = [["Driver", "Distance (km)", "Liters", "Efficiency (km/L)", "Date"]];
            Object.values(data).forEach(r => rows.push([r.driver, r.distance, r.liters, r.efficiency, r.date]));
            const ws = XLSX.utils.aoa_to_sheet(rows);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "FleetReport");
            XLSX.writeFile(wb, "iMerch_Fleet_Report.xlsx");
        };

        window.clearLogs = async () => {
            if(confirm("Clear all report data?")) {
                await remove(ref(db, 'reports'));
                alert("Logs cleared.");
                closeModal('chartModal');
            }
        };

        window.checkAdminPass = async () => {
            if(prompt("Admin PIN:") === "1234") {
                document.getElementById('chartModal').style.display='flex';
                const snap = await get(ref(db, 'reports'));
                const list = document.getElementById('leaderboardList');
                list.innerHTML = "";
                if(snap.val()) {
                    Object.values(snap.val()).forEach(r => {
                        list.innerHTML += `<div class="leaderboard-item"><span>${r.driver} (${r.date})</span><b>${r.efficiency} km/L</b></div>`;
                    });
                } else { list.innerHTML = "No records found."; }
            }
        };

        onValue(ref(db, 'cars'), (s) => {
            const data = s.val(); if(!data) return;
            for(let id in data) {
                const { lat, lng, status } = data[id];
                if(!vehicleMarkers[id]) vehicleMarkers[id] = L.marker([lat, lng]).addTo(map).bindPopup(id.toUpperCase());
                else vehicleMarkers[id].setLatLng([lat, lng]);
            }
        });

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; const dLat = (lat2 - lat1) * Math.PI / 180; const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        window.openFuelModal = () => document.getElementById('fuelModal').style.display='flex';
        window.closeModal = (id) => document.getElementById(id).style.display='none';
        window.toggleTheme = () => document.body.classList.toggle('dark-mode');
        window.updateDriverProfile(); // Run on load
    </script>
</body>
</html>
