<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CarTracker PH Live</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html, #map { height: 100%; width: 100%; margin: 0; padding: 0; background: #f0f0f0; }
        .menu { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1000; background: white; padding: 15px; border-radius: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.3); display: flex; flex-direction: column; align-items: center; gap: 5px; min-width: 220px; border: 2px solid #007AFF; }
        button { padding: 12px 20px; border-radius: 12px; border: none; background: #007AFF; color: white; font-weight: bold; width: 100%; cursor: pointer; font-size: 16px; }
        .speed-display { font-size: 32px; font-weight: bold; color: #007AFF; margin: 5px 0; }
        .status { font-size: 13px; color: #444; text-align: center; font-weight: 500; }
        .ph-flag { font-size: 10px; color: #999; margin-top: 2px; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="menu">
        <button onclick="toggleTracking()" id="btn">📡 Start PH Tracking</button>
        <div id="speed" class="speed-display">0 km/h</div>
        <div id="status" class="status">Waiting for GPS...</div>
        <div class="ph-flag">🇵🇭 Philippines Real-time Feed</div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // CONFIG: Using your provided Firebase URL
        const firebaseConfig = { databaseURL: "https://cartracker-1df45-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        // LAYERS
        const streetMap = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OSM' });
        const satelliteMap = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: 'Esri' });

        // INITIAL VIEW: Centered on Philippines (Manila coordinates: 14.5995, 120.9842)
        const map = L.map('map', {
            center: [14.5995, 120.9842],
            zoom: 12,
            layers: [streetMap]
        });

        L.control.layers({ "Street": streetMap, "Satellite": satelliteMap }).addTo(map);
        let carMarker = L.marker([14.5995, 120.9842]).addTo(map);

        // MONITOR: Listen for updates
        onValue(ref(db, 'cars/car1'), (snap) => {
            if(snap.exists()){
                const {lat, lng, speed} = snap.val();
                carMarker.setLatLng([lat, lng]);
                map.setView([lat, lng]);
                document.getElementById('speed').innerText = (speed || 0) + " km/h";
                document.getElementById('status').innerText = "Live: " + new Date().toLocaleTimeString('en-PH');
            }
        });

        // TRACKER: Send data to Firebase
        let watchID = null;
        window.toggleTracking = () => {
            const btn = document.getElementById('btn');
            if(watchID) {
                navigator.geolocation.clearWatch(watchID);
                watchID = null;
                btn.innerText = "📡 Start PH Tracking";
                btn.style.background = "#007AFF";
                document.getElementById('status').innerText = "Tracking Stopped";
            } else {
                watchID = navigator.geolocation.watchPosition(pos => {
                    const lat = pos.coords.latitude;
                    const lng = pos.coords.longitude;
                    let speedKMH = Math.round((pos.coords.speed || 0) * 3.6); 

                    document.getElementById('speed').innerText = speedKMH + " km/h";

                    set(ref(db, 'cars/car1'), { 
                        lat: lat, 
                        lng: lng,
                        speed: speedKMH,
                        lastUpdate: new Date().toISOString()
                    });
                }, err => {
                    alert("Please enable High Accuracy GPS in your phone settings.");
                }, { enableHighAccuracy: true });

                btn.innerText = "🛑 Stop Tracking";
                btn.style.background = "#FF3B30";
            }
        };
    </script>
</body>
</html>
